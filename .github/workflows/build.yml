name: Build and Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Plugins
        run: |
          ./gradlew clean
          ./gradlew make makePluginsJson --stacktrace

      - name: Prepare Artifacts
        run: |
          mkdir -p builds
          find . -name "*.cs3" -exec cp {} builds/ \;
          [ -f plugins.json ] && cp plugins.json builds/ || find . -name "plugins.json" -exec cp {} builds/ \;
          cd builds
          sed -i "s/\"url\":\"\(.*\).cs3\"/\"url\":\"https:\/\/raw.githubusercontent.com\/${{ github.repository }}\/builds\/\1.cs3\"/g" plugins.json

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: builds
          branch: builds
          clean: true